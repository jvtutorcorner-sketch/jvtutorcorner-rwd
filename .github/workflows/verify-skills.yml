name: Verify Skills Status

on:
  push:
    branches: [main, develop]
    paths:
      - '.agents/skills/**/*.md'
      - 'e2e/**/*.spec.ts'
      - 'scripts/validate-skill-frontmatter.js'
      - 'scripts/update-skill-status.js'
      - '.github/workflows/verify-skills.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '.agents/skills/**/*.md'
      - 'e2e/**/*.spec.ts'
      - 'scripts/validate-skill-frontmatter.js'
      - 'scripts/update-skill-status.js'
      - '.github/workflows/verify-skills.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-frontmatter:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    name: Validate Frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate Skill frontmatter
        run: node scripts/validate-skill-frontmatter.js

      - name: Scan for hardcoded secrets (skills/workflow)
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='(ghp_[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|jv_(secret|secure)_bypass_[0-9]{4})'
          if grep -RInE --exclude-dir=.git --exclude-dir=node_modules "$PATTERN" .agents/skills .github/workflows; then
            echo "Potential hardcoded secret detected."
            exit 1
          fi

  update-status:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    name: Update Skill Status
    runs-on: ubuntu-latest
    needs: validate-frontmatter
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update Skill status files
        run: node scripts/update-skill-status.js

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain .agents/skills/)" ]; then
            echo "No skill status changes to commit."
            exit 0
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .agents/skills/
          git commit -m "chore(skills): auto-update verification status [skip ci]"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"

  test-affected-skills:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    name: Test Affected Skills
    runs-on: ubuntu-latest
    needs: validate-frontmatter
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run verification tests
        run: npx playwright test --grep "verification" --reporter=html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
