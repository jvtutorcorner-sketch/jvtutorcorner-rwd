name: Verify Skills Status

on:
  push:
    branches: [main, develop]
    paths:
      - '.agents/skills/**/*.md'
      - 'e2e/**/*.spec.ts'
      - '.github/workflows/verify-skills.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '.agents/skills/**/*.md'
      - 'e2e/**/*.spec.ts'
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Skill 名稱（留空檢查所有）'
        required: false

jobs:
  validate-frontmatter:
    name: 驗證 Frontmatter 格式
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 驗證 Skill frontmatter
        run: node scripts/validate-skill-frontmatter.js

  update-status:
    name: 更新 Skill 狀態
    runs-on: ubuntu-latest
    needs: validate-frontmatter
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 更新 Skill 狀態
        run: node scripts/update-skill-status.js

      - name: Commit 變更
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .agents/skills/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(skills): auto-update verification status"

      - name: Push changes
        if: github.event_name == 'push'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  test-affected-skills:
    name: 測試受影響的 Skill
    runs-on: ubuntu-latest
    needs: validate-frontmatter
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 執行驗證測試
        run: npx playwright test --grep 'verification' --reporter=html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
