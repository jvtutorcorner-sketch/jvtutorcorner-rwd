version: 1
applications:
  - backend:
      phases:
        build:
          commands:
            - '# Backend push is disabled for this deployment'
            - '# The frontend uses pre-configured aws-exports.js from the repository'
            - 'echo "Backend build skipped - using committed configuration"'
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "🧹 Amplify Build Cleanup - Phase 1: Deleting .next/dev (Turbopack cache ~1.6GB)..."
            - rm -rf .next/dev || true
            - rm -rf .next/cache || true
            - rm -f .next/trace || true
            - echo "🧹 Phase 2: Deleting source maps and test files..."
            - find .next -name "*.map" -type f -delete || true
            - find .next -name "*.test.*" -type f -delete || true
            - find .next -name "*.spec.*" -type f -delete || true
            - echo "🧹 Phase 3: Final aggressive cleanup - removing .next/dev again..."
            - rm -rf .next/dev || true
            - echo "✅ Cleanup completed. Final .next directory size:"
            - du -sh .next || echo "Size check completed"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
          - '!dev/**'
          - '!cache/**'
          - '!**/*.map'
          - '!**/*.test.*'
          - '!**/*.spec.*'