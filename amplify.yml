version: 1
applications:
  - backend:
      phases:
        build:
          commands:
            - '# Backend push is disabled for this deployment'
            - '# The frontend uses pre-configured aws-exports.js from the repository'
            - 'echo "Backend build skipped - using committed configuration"'
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            # ★ 关键优化：删除开发文件和缓存以减少部署大小 ★
            - echo "Cleaning up development files to reduce deployment size..."
            # 删除开发调试文件 (1.6GB+)
            - rm -rf .next/dev || true
            # 删除缓存文件
            - rm -rf .next/cache || true
            - rm -f .next/trace || true
            # 删除 source maps
            - find .next/static -name "*.map" -delete || true
            # 删除测试文件
            - find .next/static -name "*.test.*" -delete || true
            - echo "Cleanup completed. Remaining .next size:"
            - du -sh .next || echo "Size calculation skipped"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'