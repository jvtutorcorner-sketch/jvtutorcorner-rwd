version: 1
applications:
  - backend:
      phases:
        build:
          commands:
            - '# Backend push is disabled for this deployment'
            - '# The frontend uses pre-configured aws-exports.js from the repository'
            - 'echo "Backend build skipped - using committed configuration"'
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - 'echo "Build complete. Next.js standalone mode enabled. Verifying .next size..."'
            - 'du -sh .next || echo "Size verification skipped"'
      artifacts:
        # Upload only the .next/standalone directory (production runtime)
        baseDirectory: .next/standalone
        files:
          - '**/*'