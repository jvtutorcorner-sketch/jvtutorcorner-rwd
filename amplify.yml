version: 1
applications:
  - backend:
      phases:
        build:
          commands:
            - '# Backend push is disabled for this deployment'
            - '# The frontend uses pre-configured aws-exports.js from the repository'
            - 'echo "Backend build skipped - using committed configuration"'
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - rm -rf .next/dev .next/cache .next/build || true
            - npm prune --production
            - echo "Removed .next/dev, .next/cache, and devDependencies"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
          - '!cache/**/*'
          - '!dev/**/*'
          - '!**/*.map'
          - '!**/*.map'